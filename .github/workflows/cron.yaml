name: Cron Job
on:
  workflow_dispatch:
#   schedule:
#     - cron: "0 */3 * * *"
jobs:
  cron-job:
    name: cron job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Get dotenv
        run: echo ${{ secrets.DOTENV }} > ./.env
      - name: Install dependencies
        run: bun install
      - name: Run bun
        run: bun run start
      - name: Save temp data
        if: ${{ success() }}
        uses: EndBug/add-and-commit@v9
        with:
          add: '["./temp/user.json"]'
          default_author: github_actions
          fetch: false
          tag_push: "--force"
          message: "Update temp data"
